
[server "http"]
    port = 45138

[data]
    groups = default, subjects

[datasource "main"]
    database = rbac-web-app
    driver = mysql
    enabled = 1
    host = localhost
    name = main
    password = rbac-web-app
    port = 0
    prefix = rbac_wa_
    uri = uri:datasource:main#rbac-web-app
    username = rbac-web-app

[datagroup "default"]
    alias = default
    datasource = main
    enabled = 1
    table-name-prefix = rbac_wa_
    uri = uri:datagroup:default

[datagroup "subjects"]
    alias = subjects
    datasource = main 
    enabled = 1
    table-name-prefix = subjects_
    uri = uri:datagroup:subjects

[server "www.jwt"]
    use-cookie = 1
    use-header = 1
    max-age-in-sec = 3600
    key-secret = fffffffffffffff
    do-verify = 1


[jwt-adapter "libgin"]
    name = libgin
    enabled = 1
    priority = 9
    use-http-cookie = 1
    use-http-header = 1
    use-http-query = 1

    cookie.name = json-web-token
    cookie.max-age = 0
    cookie.path = /
    cookie.domain = localhost
    cookie.secure = 0
    cookie.http-only = 0
