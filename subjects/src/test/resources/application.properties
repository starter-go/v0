# src/test/resources/
# application.properties


[data]
    groups = subjects
    sources = main




[datagroup "subjects"]
    alias = subjects
    enabled = 1
    table-name-prefix = subjects_
    datasource = main
    uri = uri://data-group/subjects


[datasource "main"]

    database = rbac-web-app
    driver = mysql
    enabled = 1
    host = localhost
    name = main
    password = rbac-web-app
    port = 0
    username = rbac-web-app

################################################################################
# cases

[units]
    list = TrySessionService


[test-case "example"]
    enabled = 0

[test-case "session-service"]
    enabled = 1

[test-case "subjects"]
    enabled = 0


